name: Create PR in DH3 Infrastructure

on:
  workflow_call:
    inputs:
      terraform_path:
        description: The relative path to the terraform variable file
        required: true
        type: string
      terraform_variable_names:
        description: Newline separated list of terraform variables to update in the same file (uses the same tag)
        required: true
        type: string
      team_name:
        description: The name of the team owning the change. Added to the PR as a `teamname:{name}` label.
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  create_pr_in_dh3_infrastructure:
    name: Create PR in DH3 Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Validate terraform_path
        shell: bash
        run: |
          if [[ "${{ inputs.terraform_path }}" != *.auto.tfvars ]]; then
            echo "::error::terraform_path must point to a *.auto.tfvars file (got '${{ inputs.terraform_path }}')"
            exit 1
          fi

      - name: Find associated pull request
        uses: Energinet-DataHub/.github/.github/actions/find-related-pr-number@actions/v2
        id: find_pull_request

      - name: Set image tag
        id: vars
        # Tag is formatted as pr[PR_NUMBER]]
        run: echo "tag=pr${{ steps.find_pull_request.outputs.pull_request_number }}" >> $GITHUB_OUTPUT

      - uses: actions/create-github-app-token@v3
        id: generate_token
        with:
          client-id: ${{ vars.dh3_infra_pr_client_id }}
          private-key: ${{ secrets.dh3_infra_pr_app_private_key }}
          owner: Energinet-DataHub

      - name: Checkout infra repo
        uses: actions/checkout@v6
        with:
          repository: Energinet-DataHub/dh3-infrastructure
          token: ${{ steps.generate_token.outputs.token }}
          path: infra-repo

      - name: Update image tags
        id: update_image_tags
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $file = "infra-repo/${{ inputs.terraform_path }}"
          $tag = "${{ steps.vars.outputs.tag }}"

          if (-not (Test-Path $file)) {
            New-Item -Path $file -ItemType File -Force | Out-Null
            Write-Output "::warning::Variable file did not exist, it has been created"
            "new_file=true" >> $env:GITHUB_OUTPUT
          }

          # Contains the list of new variables that was added to the variable file.
          $newVars = @()

          $vars = "${{ inputs.terraform_variable_names }}"
          $vars -split "`n" | ForEach-Object {
            $varname = $_.Trim()
            if (-not $varname) { return }

            $content = Get-Content $file
            $pattern = "^\s*${varname}\s*="
            $found = $false

            $newContent = $content | ForEach-Object {
              if ($_ -match $pattern) {
                $found = $true
                $_ -replace '(")[^"]*(")', "`"$tag`""
              } else {
                $_
              }
            }

            if ($found) {
              $newContent | Set-Content $file
            } else {
              $newVar = "$varname = `"$tag`""
              Add-Content $file $newVar
              $newVars += $varname
              Write-Output "::warning::A new variable ($varname) was added to the variable file"
            }
          }

          if ($newVars.Count -gt 0) {
            $newVarsList = $newVars -join ", "
            "new_variables=$newVarsList" >> $env:GITHUB_OUTPUT
          }

      - name: Create Pull Request in Infra Repo
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.generate_token.outputs.token }}
          path: infra-repo
          commit-message: Update image tag to ${{ steps.vars.outputs.tag }}
          branch: update-${{github.repository}}-${{ inputs.terraform_path }}
          title: "[${{github.repository}}] Deploy image ${{ steps.vars.outputs.tag }} (${{ inputs.terraform_path }})"
          body: |
            This PR updates the infrastructure to use image:

            **`${{ steps.vars.outputs.tag }}`**

            ${{ steps.update_image_tags.outputs.new_file != '' && ':warning: A new terraform variable file was created - this could indicate a misconfiguration, but is expected when a new image is created for the first time.' || '' }}
            ${{ steps.update_image_tags.outputs.new_variables != '' && format(':warning: New variables were added to the terraform file: `{0}` - this could indicate a misconfiguration, but is expected when a new image is created for the first time.', steps.update_image_tags.outputs.new_variables) || '' }}

          labels: update, ${{github.repository}}, teamname:${{ inputs.team_name }}

      - name: Enable auto-merge
        if: steps.create_pr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ steps.generate_token.outputs.token }}
          repository: Energinet-DataHub/dh3-infrastructure
          pull-request-number: ${{ steps.create_pr.outputs.pull-request-number }}
          merge-method: squash
