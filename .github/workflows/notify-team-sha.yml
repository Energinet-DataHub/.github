name: Notify team

# DESCRIPTION:
# This workflow is used to notify teams about failing deployments
# by sending an email to their MS Team Channel or possibly direct mails.
#
# Note: Variables prefixed "EMAIL_" are organization variables allowing this reusable workflow to access them
# regardless of where the workflow is used

on:
  workflow_call:
    inputs:
      team_name:
        description: The name of the team to be notified.
        required: true
        type: string
      email:
        description: The email address to send the notification to. This should be the email address of the MS Team Channel.
        required: true
        type: string
      subject:
        description: The email subject. Should contain environment information when possible.
        required: true
        type: string
      body:
        description: Additional content for the email body. Apart from this the email body will also always contain a link to the failed build.
        required: false
        default: ""
        type: string
      sha_commit:
        description: The commit SHA to link to in the email
        required: true
        type: string

jobs:
  notify_team:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.dh3serviceaccount_appid }}
          private-key: ${{ secrets.dh3serviceaccount_privatekey }}
          owner: Energinet-Datahub # the next step will require access to other repositories in the org

      - name: Get pull request for commit
        id: get_pr
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          SHA_COMMIT: ${{ inputs.sha_commit }}
          REPO: ${{ github.repository }}
        run: |
          Write-Host "Looking up PR for commit: $env:SHA_COMMIT in $env:REPO"

          try {
              $prs = gh api "repos/$env:REPO/commits/$env:SHA_COMMIT/pulls" --jq '.' | ConvertFrom-Json
          } catch {
              Write-Warning "Failed to query PRs for commit $env:SHA_COMMIT"
              "summary=" >> $env:GITHUB_OUTPUT
              exit 0
          }

          $merged = $prs | Where-Object { $_.merged_at -ne $null } | Select-Object -First 1

          if (-not $merged) {
              Write-Warning "No merged PR found for commit $env:SHA_COMMIT"
              "summary=" >> $env:GITHUB_OUTPUT
              exit 0
          }

          $prNumber = $merged.number
          $prUrl = $merged.html_url
          $mergedBy = $merged.merged_by.login
          $mergedAt = [datetime]$merged.merged_at

          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("Central Europe Standard Time")
          $localTime = [System.TimeZoneInfo]::ConvertTimeFromUtc($mergedAt, $timeZone).ToString('yyyy-MM-dd HH:mm:ss')

          $summary = "<a href='$prUrl'>PR #$prNumber</a><br>By: <b>$mergedBy</b> on $localTime"

          Write-Host "Merged PR summary:"
          Write-Host $summary

          "summary=$summary" >> $env:GITHUB_OUTPUT

      - name: Build email content
        id: email_content
        shell: bash
        run: |
          content="<html><body><br>${{ inputs.body }}"

          if [ -n "${{ steps.get_pr.outputs.summary || '' }}" ]; then
            content="$content<br><br>${{ steps.get_pr.outputs.summary }}"
          fi

          content="$content</body></html>"

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email
        uses: Energinet-DataHub/.github/.github/actions/send-email@actions/v1
        with:
          sendgrid-api-key: ${{ secrets.sendgrid_instance_system_notifications_api_key }}
          team-name: ${{ inputs.team_name }}
          to: ${{ inputs.email }}
          from: ${{ vars.email_internal_sender }}
          subject: ${{ inputs.subject }}
          content: ${{ steps.email_content.outputs.content }}
