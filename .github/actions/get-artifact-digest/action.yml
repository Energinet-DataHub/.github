name: Get Artifact Digest
description: Resolves the attestation subject and digest for a container image or zip artifact.

inputs:
  artifact_name:
    description: The artifact name (container package name or release tag prefix)
    required: true
  artifact_type:
    description: Type of artifact - container or zip
    required: true
  token:
    description: GitHub token with packages read permission
    required: true

outputs:
  subject:
    description: The subject name
    value: ${{ steps.resolve.outputs.subject }}
  digest:
    description: The subject digest
    value: ${{ steps.resolve.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Resolve container digest
      if: ${{ inputs.artifact_type == 'container' }}
      id: container
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        ARTIFACT_NAME: ${{ inputs.artifact_name }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        owner=${REPO%%/*}
        repo_name=${REPO##*/}
        package_name=$(echo ${repo_name}/${ARTIFACT_NAME} | sed 's|/|%2F|g')

        digest=$(gh api /orgs/${owner}/packages/container/${package_name}/versions?per_page=1 --jq '.[0].name')
        if [[ -z $digest ]]; then
          echo "::error::No container versions found for ${repo_name}/${ARTIFACT_NAME}"
          exit 1
        fi

        subject=$(echo oci://ghcr.io/${owner}/${repo_name}/${ARTIFACT_NAME} | tr '[:upper:]' '[:lower:]')
        echo "Subject: $subject"
        echo "Digest: $digest"
        echo "subject=$subject" >> $GITHUB_OUTPUT
        echo "digest=$digest" >> $GITHUB_OUTPUT

    - name: Resolve zip digest
      if: ${{ inputs.artifact_type == 'zip' }}
      id: zip
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        ARTIFACT_NAME: ${{ inputs.artifact_name }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        # Find latest release matching prefix
        release_tag=$(gh api /repos/${REPO}/releases?per_page=100 --paginate \
          --jq "[.[] | select(.tag_name | test(\"^${ARTIFACT_NAME}_[0-9]+$\"))] | .[0].tag_name" | head -1)

        if [[ -z $release_tag || $release_tag == null ]]; then
          echo "::error::No release found with prefix ${ARTIFACT_NAME}"
          exit 1
        fi
        echo "Found release: $release_tag"

        # Download zip and compute digest
        tmp_dir=$(mktemp -d)
        gh release download $release_tag --repo $REPO --pattern '*.zip' --dir $tmp_dir
        zip_file=$(find $tmp_dir -name '*.zip' | head -1)

        if [[ -z $zip_file ]]; then
          echo "::error::No zip asset found in release $release_tag"
          exit 1
        fi

        digest=sha256:$(sha256sum $zip_file | awk '{print $1}')
        subject=$(basename $zip_file)
        echo "Subject: $subject"
        echo "Digest: $digest"
        echo "subject=$subject" >> $GITHUB_OUTPUT
        echo "digest=$digest" >> $GITHUB_OUTPUT

    - name: Set outputs
      id: resolve
      shell: bash
      env:
        CONTAINER_SUBJECT: ${{ steps.container.outputs.subject }}
        CONTAINER_DIGEST: ${{ steps.container.outputs.digest }}
        ZIP_SUBJECT: ${{ steps.zip.outputs.subject }}
        ZIP_DIGEST: ${{ steps.zip.outputs.digest }}
      run: |
        subject=${CONTAINER_SUBJECT:-$ZIP_SUBJECT}
        digest=${CONTAINER_DIGEST:-$ZIP_DIGEST}
        echo "subject=$subject" >> $GITHUB_OUTPUT
        echo "digest=$digest" >> $GITHUB_OUTPUT
