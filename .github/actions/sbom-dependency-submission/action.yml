name: SBOM Dependency Submission
description: Downloads the SBOM from the latest release and submits it to the GitHub Dependency Submission API.

inputs:
  image_name:
    description: The image name used as the release tag prefix (e.g. demo_app)
    required: true
  correlator:
    description: Unique correlator for the dependency snapshot (defaults to image_name)
    required: false
  token:
    description: GitHub token with contents write permission
    required: true

runs:
  using: composite
  steps:
    - name: Submit SBOM to Dependency Graph
      shell: pwsh
      env:
        GH_TOKEN: ${{ inputs.token }}
        IMAGE_NAME: ${{ inputs.image_name }}
        CORRELATOR: ${{ inputs.correlator || inputs.image_name }}
        REPO: ${{ github.repository }}
        SHA: ${{ github.sha }}
        REF: ${{ github.ref }}
      run: |
        # Find the latest release matching the image name prefix
        $releases = gh release list --repo $env:REPO --limit 50 --json tagName,createdAt | ConvertFrom-Json
        $latestRelease = $releases | Where-Object { $_.tagName -like "$($env:IMAGE_NAME)_*" } | Sort-Object createdAt -Descending | Select-Object -First 1

        if (-not $latestRelease) {
          Write-Error "No release found for image '$($env:IMAGE_NAME)'"
          exit 1
        }

        Write-Host "Found release: $($latestRelease.tagName)"

        # Download the SBOM from the release
        $tempDir = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP "sbom-$($env:IMAGE_NAME)")
        gh release download $latestRelease.tagName --repo $env:REPO --pattern "sbom.spdx.json" --dir $tempDir.FullName

        $sbomPath = Join-Path $tempDir.FullName "sbom.spdx.json"
        if (-not (Test-Path $sbomPath)) {
          Write-Error "SBOM file not found in release $($latestRelease.tagName)"
          exit 1
        }

        # Parse SPDX JSON
        $sbom = Get-Content $sbomPath -Raw | ConvertFrom-Json
        Write-Host "SBOM contains $($sbom.packages.Count) packages"
        Write-Host "SBOM document name: $($sbom.name)"

        # Build resolved dependencies from SPDX packages
        $resolved = @{}
        foreach ($pkg in $sbom.packages) {
          # Skip the document package itself
          if ($pkg.SPDXID -eq "SPDXRef-DOCUMENT") { continue }

          # Extract purl from externalRefs
          $purl = $null
          foreach ($ref in $pkg.externalRefs) {
            if ($ref.referenceType -eq "purl") {
              $purl = $ref.referenceLocator
              break
            }
          }

          if (-not $purl) { continue }

          $resolved[$pkg.SPDXID] = @{
            package_url = $purl
          }
        }

        Write-Host "Resolved $($resolved.Count) dependencies with purls"

        # Build the dependency submission snapshot
        $snapshot = @{
          version  = 0
          sha      = $env:SHA
          ref      = $env:REF
          job      = @{
            correlator = $env:CORRELATOR
            id         = $env:GITHUB_RUN_ID
          }
          detector = @{
            name    = "sbom-dependency-submission"
            version = "1.0.0"
            url     = "https://github.com/$($env:REPO)"
          }
          scanned  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          manifests = @{
            "sbom.spdx.json" = @{
              name     = "sbom.spdx.json"
              file     = @{
                source_location = "sbom.spdx.json"
              }
              resolved = $resolved
            }
          }
        }

        $body = $snapshot | ConvertTo-Json -Depth 10 -Compress

        # Submit to the Dependency Submission API
        $headers = @{
          "Accept"               = "application/vnd.github+json"
          "Authorization"        = "Bearer $($env:GH_TOKEN)"
          "X-GitHub-Api-Version" = "2022-11-28"
        }

        $response = Invoke-RestMethod `
          -Uri "https://api.github.com/repos/$($env:REPO)/dependency-graph/snapshots" `
          -Method Post `
          -Headers $headers `
          -Body $body `
          -ContentType "application/json"

        Write-Host "Dependency submission result: $($response.result)"
        Write-Host "Message: $($response.message)"
