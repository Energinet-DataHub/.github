name: SBOM Dependency Submission
description: Downloads the SBOM from the latest release via attestation API and submits it to the GitHub Dependency Submission API.

inputs:
  artifact_name:
    description: The artifact name used as the container package name
    required: true
  correlator:
    description: Unique correlator for the dependency snapshot (defaults to artifact_name)
    required: false
  token:
    description: GitHub token with contents write permission
    required: true

runs:
  using: composite
  steps:
    - name: Submit SBOM to Dependency Graph
      shell: pwsh
      env:
        GH_TOKEN: ${{ inputs.token }}
        IMAGE_NAME: ${{ inputs.artifact_name }}
        CORRELATOR: ${{ inputs.correlator || inputs.artifact_name }}
        REPO: ${{ github.repository }}
        SHA: ${{ github.sha }}
        REF: ${{ github.ref }}
      run: |
        $owner, $repoName = $env:REPO -split '/'

        # Get latest container image version digest
        $packageName = "$repoName/$($env:IMAGE_NAME)" -replace '/', '%2F'
        Write-Host "Looking up latest container version for package: $repoName/$($env:IMAGE_NAME)"

        $apiHeaders = @{
          "Accept"               = "application/vnd.github+json"
          "Authorization"        = "Bearer $($env:GH_TOKEN)"
          "X-GitHub-Api-Version" = "2022-11-28"
        }

        $versionsUrl = "https://api.github.com/orgs/$owner/packages/container/$packageName/versions?per_page=1"
        $versions = Invoke-RestMethod -Uri $versionsUrl -Headers $apiHeaders
        if (-not $versions -or $versions.Count -eq 0) {
          Write-Error "No container versions found for package '$repoName/$($env:IMAGE_NAME)'"
          exit 1
        }

        $digest = $versions[0].name
        Write-Host "Latest image digest: $digest"

        # Query attestations for this digest
        $attestationsUrl = "https://api.github.com/repos/$($env:REPO)/attestations/$digest"
        $attestations = Invoke-RestMethod -Uri $attestationsUrl -Headers $apiHeaders

        if (-not $attestations.attestations -or $attestations.attestations.Count -eq 0) {
          Write-Error "No attestations found for digest '$digest'"
          exit 1
        }

        # Find the sbom-link attestation
        $sbomUrl = $null
        foreach ($att in $attestations.attestations) {
          $payload = $att.bundle.dsseEnvelope.payload
          $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($payload))
          $statement = $decoded | ConvertFrom-Json

          if ($statement.predicateType -eq "https://datahub.dk/attestations/sbom-link/v1") {
            $sbomUrl = $statement.predicate.sbom.url
            Write-Host "Found SBOM attestation with URL: $sbomUrl"
            break
          }
        }

        if (-not $sbomUrl) {
          Write-Error "No sbom-link attestation found for digest '$digest'"
          exit 1
        }

        # Download the SBOM
        $tempDir = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP "sbom-$($env:IMAGE_NAME)")
        $sbomPath = Join-Path $tempDir.FullName "sbom.spdx.json"

        $headers = @{
          "Authorization" = "Bearer $($env:GH_TOKEN)"
          "Accept"        = "application/octet-stream"
        }
        Invoke-RestMethod -Uri $sbomUrl -Headers $headers -OutFile $sbomPath

        if (-not (Test-Path $sbomPath)) {
          Write-Error "Failed to download SBOM from $sbomUrl"
          exit 1
        }

        # Parse SPDX JSON
        $sbom = Get-Content $sbomPath -Raw | ConvertFrom-Json
        Write-Host "SBOM document name: $($sbom.name)"
        Write-Host "SBOM contains $($sbom.packages.Count) packages"

        # Build resolved dependencies from SPDX packages
        $resolved = @{}
        foreach ($pkg in $sbom.packages) {
          # Skip the document package itself
          if ($pkg.SPDXID -eq "SPDXRef-DOCUMENT") { continue }

          # Extract purl from externalRefs
          $purl = $null
          foreach ($ref in $pkg.externalRefs) {
            if ($ref.referenceType -eq "purl") {
              $purl = $ref.referenceLocator
              break
            }
          }

          if (-not $purl) { continue }

          $resolved[$pkg.SPDXID] = @{
            package_url = $purl
          }
        }

        Write-Host "Resolved $($resolved.Count) dependencies with purls"

        # Build the dependency submission snapshot
        $snapshot = @{
          version  = 0
          sha      = $env:SHA
          ref      = $env:REF
          job      = @{
            correlator = $env:CORRELATOR
            id         = $env:GITHUB_RUN_ID
          }
          detector = @{
            name    = "sbom-dependency-submission"
            version = "1.0.0"
            url     = "https://github.com/$($env:REPO)"
          }
          scanned  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          manifests = @{
            "sbom.spdx.json" = @{
              name     = "sbom.spdx.json"
              file     = @{
                source_location = "sbom.spdx.json"
              }
              resolved = $resolved
            }
          }
        }

        $body = $snapshot | ConvertTo-Json -Depth 10 -Compress

        # Submit to the Dependency Submission API
        $submitHeaders = @{
          "Accept"               = "application/vnd.github+json"
          "Authorization"        = "Bearer $($env:GH_TOKEN)"
          "X-GitHub-Api-Version" = "2022-11-28"
        }

        $response = Invoke-RestMethod `
          -Uri "https://api.github.com/repos/$($env:REPO)/dependency-graph/snapshots" `
          -Method Post `
          -Headers $submitHeaders `
          -Body $body `
          -ContentType "application/json"

        Write-Host "Dependency submission result: $($response.result)"
        Write-Host "Message: $($response.message)"
