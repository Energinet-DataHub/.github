name: SBOM Dependency Submission
description: Verifies an attestation, downloads the SBOM, and submits to the Dependency Graph.

inputs:
  subject:
    description: Attestation subject name
    required: true
  digest:
    description: Subject digest
    required: true
  file_path:
    description: Path to local artifact file (required for zip, not needed for container)
    required: false
  correlator:
    description: Unique correlator for the dependency snapshot
    required: true
  token:
    description: GitHub token with contents write permission
    required: true

runs:
  using: composite
  steps:
    - name: Verify attestation and download SBOM
      id: sbom
      shell: pwsh
      env:
        GH_TOKEN: ${{ inputs.token }}
        SUBJECT: ${{ inputs.subject }}
        DIGEST: ${{ inputs.digest }}
        FILE_PATH: ${{ inputs.file_path }}
        REPO: ${{ github.repository }}
      run: |
        $ErrorActionPreference = 'Stop'
        $owner = ($env:REPO -split '/')[0]

        # For containers, use oci:// subject. For zips, use the local file path.
        if ($env:FILE_PATH) {
          $artifact = $env:FILE_PATH
        } else {
          $artifact = "$($env:SUBJECT)@$($env:DIGEST)"
          # Login to ghcr.io for private image access
          $env:GH_TOKEN | docker login ghcr.io -u USERNAME --password-stdin
        }

        # Verify attestation
        gh attestation verify $artifact --owner $owner --predicate-type https://datahub.dk/attestations/sbom-link/v1

        # Download attestation bundle
        $bundleDir = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP 'attestation')
        Push-Location $bundleDir.FullName
        gh attestation download $artifact --owner $owner --predicate-type https://datahub.dk/attestations/sbom-link/v1
        Pop-Location

        # Parse SBOM URL from bundle
        $bundleFile = Get-ChildItem $bundleDir.FullName -Filter '*.jsonl' | Select-Object -First 1
        $payload = (Get-Content $bundleFile.FullName | ConvertFrom-Json).dsseEnvelope.payload
        $predicate = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($payload)) | ConvertFrom-Json
        $sbomUrl = $predicate.predicate.sbom.url
        if (-not $sbomUrl) { throw 'Could not extract SBOM URL from attestation' }
        Write-Host "SBOM URL: $sbomUrl"

        # Download SBOM from release
        $releaseTag = ($sbomUrl -split '/releases/download/')[1] -split '/' | Select-Object -First 1
        $sbomDir = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP 'sbom')
        gh release download $releaseTag --repo $env:REPO --pattern 'sbom*' --dir $sbomDir.FullName

        $sbom = Get-Content (Get-ChildItem $sbomDir.FullName -Filter 'sbom*' | Select-Object -First 1).FullName | ConvertFrom-Json
        Write-Host "Downloaded SBOM: $($sbom.packages.Count) packages"
        "sbom_dir=$($sbomDir.FullName)" >> $env:GITHUB_OUTPUT

    - name: Submit SBOM to Dependency Graph
      uses: advanced-security/spdx-dependency-submission-action@v0.2.0
      with:
        filepath: ${{ steps.sbom.outputs.sbom_dir }}
        filepattern: '*.json'
        correlator: ${{ inputs.correlator }}
